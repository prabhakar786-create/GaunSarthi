<!DOCTYPE html>
<html>

<head>

<title>Taxi Booking | Gaon Sarthi</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:linear-gradient(green,darkgreen);
color:white;
text-align:center;
padding:20px;
}

.container{
padding:30px;
text-align:center;
}

.card{
background:white;
padding:20px;
max-width:450px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px #ccc;
}

input,select{
width:90%;
padding:10px;
margin-top:5px;
}

button{
background:green;
color:white;
padding:12px 25px;
border:none;
border-radius:6px;
margin-top:15px;
cursor:pointer;
}

</style>

<script>

function bookRide(){

var name=document.getElementById("name").value;

var mobile=document.getElementById("mobile").value;

var pickup=document.getElementById("pickup").value;

var drop=document.getElementById("drop").value;

var vehicle=document.getElementById("vehicle").value;

var message="Taxi Booking%0A"
+"Name: "+name+"%0A"
+"Mobile: "+mobile+"%0A"
+"Vehicle: "+vehicle+"%0A"
+"Pickup: "+pickup+"%0A"
+"Destination: "+drop;

window.open("https://wa.me/919792497071?text="+message);

}

</script>

</head>

<body>

<header>

<h1>Gaon Sarthi</h1>

<p>Bike Taxi | Car Taxi Booking</p>

</header>

<div class="container">

<div class="card">

<h2>Book Ride</h2>

Name<br>
<input type="text" id="name">

<br><br>

Mobile<br>
<input type="text" id="mobile">

<br><br>

Vehicle Type<br>

<select id="vehicle">

<option>Bike</option>

<option>Car</option>

</select>

<br><br>

Pickup Location<br>
<input type="text" id="pickup">

<br><br>

Destination<br>
<input type="text" id="drop">

<br><br>
<a href="fare-booking.html">Book Ride</a>
  <br><br>
<button onclick="bookRide()">Book on WhatsApp</button>

</div>

</div>

</body>

</html>


</body>
</html>
