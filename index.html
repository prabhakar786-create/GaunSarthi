<!DOCTYPE html>
<html>

<head>

<title>Gaon Sarthi</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:linear-gradient(green,darkgreen);
color:white;
text-align:center;
padding:18px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:15px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 0 10px #ddd;
}

.card img{
width:60px;
}

button{
background:green;
color:white;
border:none;
padding:8px 15px;
border-radius:6px;
margin-top:8px;
}

.section{
padding:15px;
}

input,select{
width:95%;
padding:8px;
margin-top:5px;
}

.bottomnav{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
box-shadow:0 -2px 10px #ccc;
}

</style>

<script>

function getLocation(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(function(pos){

document.getElementById("pickup").value=
pos.coords.latitude+","+pos.coords.longitude;

});

}else{

alert("Location not supported");

}

}

function calculateFare(){

var distance=document.getElementById("distance").value;

var vehicle=document.getElementById("vehicle").value;

var fare=0;

if(vehicle=="Bike") fare=distance*10;
if(vehicle=="Auto") fare=distance*12;
if(vehicle=="Car") fare=distance*15;

document.getElementById("fare").innerHTML="Estimated Fare ₹ "+fare;

}

function bookRide(){

var vehicle=document.getElementById("vehicle").value;

var pickup=document.getElementById("pickup").value;

var drop=document.getElementById("drop").value;

var msg="Gaon Sarthi Ride Booking%0A"
+"Vehicle:"+vehicle+"%0A"
+"Pickup:"+pickup+"%0A"
+"Destination:"+drop;

window.open("https://wa.me/919792497071?text="+msg);

}

</script>

</head>

<body>

<header>

<h2>Gaon Sarthi</h2>

<p>Delivery • Bike • Auto • Car</p>

</header>

<div class="grid">

<div class="card">

<img src="delivery.jpg">

<h3>Delivery</h3>

</div>

<div class="card">

<img src="bike.jpg">

<h3>Bike Taxi</h3>

</div>

<div class="card">

<img src="auto.jpg">

<h3>Auto</h3>

</div>

<div class="card">

<img src="car.jpg">

<h3>Car Taxi</h3>

</div>

</div>

<div class="section">

<h3>Ride Booking</h3>

Vehicle<br>

<select id="vehicle">

<option>Bike</option>
<option>Auto</option>
<option>Car</option>

</select>

<br><br>

Distance (km)<br>

<input type="number" id="distance" onkeyup="calculateFare()">

<p id="fare"></p>

Pickup Location<br>

<input type="text" id="pickup">

<br><br>

Destination<br>

<input type="text" id="drop">

<br><br>

<button onclick="getLocation()">Auto Pickup</button>

<button onclick="bookRide()">Book Ride</button>

</div>

<div class="section">

<h3>Service Area Map</h3>

<iframe
src="https://maps.google.com/maps?q=Nanpara%20Bahraich&t=&z=13&ie=UTF8&iwloc=&output=embed"
width="100%"
height="300">
</iframe>

</div>

<div class="bottomnav">

<a href="index.html">🏠 Home</a>
<a href="#">🚖 Ride</a>
<a href="#">📦 Delivery</a>
<a href="driver.html">🚗 Driver</a>
<a href="https://wa.me/919792497071">💬 Chat</a>

</div>

</body>
</html>
